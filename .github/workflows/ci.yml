name: ci

on:
  push:
  pull_request:

jobs:
  harness:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        node-version:
          - 24.13.1
          - 24.x

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Root Harness Tests
        run: npm run test:root

      - name: Template Consumer Smoke
        run: npm run test:template-smoke
